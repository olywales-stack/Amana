  /disputes:
    get:
      tags: [Disputes]
      summary: List disputes for mediators
      description: |-
        Returns paginated list of disputes accessible to the authenticated mediator.
        Error code references: `AUTH_ERROR`, `INTERNAL_ERROR`.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [OPEN, UNDER_REVIEW, RESOLVED, CLOSED]
          description: Filter by dispute status
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
      responses:
        "200":
          description: Dispute list returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: Caller is not a mediator.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          $ref: "#/components/responses/InternalError"
  /disputes/{id}/transition:
    post:
      tags: [Disputes]
      summary: Transition dispute status
      description: |-
        Mediator-only endpoint to transition a dispute to a new status.
        Valid transitions: OPEN → UNDER_REVIEW → RESOLVED/CLOSED
        Error code references: `AUTH_ERROR`, `DISPUTE_NOT_FOUND`, `DISPUTE_STATUS_TRANSITION_INVALID`, `DISPUTE_STATUS_CONFLICT`, `INTERNAL_ERROR`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DisputeIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeTransitionRequest"
      responses:
        "200":
          description: Dispute status transitioned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeResponse"
        "400":
          $ref: "#/components/responses/LegacyValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: Caller is not a mediator.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Dispute not found for the trade.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Dispute was modified by another user (optimistic concurrency conflict).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /trades:
