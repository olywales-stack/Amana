      description: |-
        Returns the current balance of the escrow contract treasury.
        Requires admin authorization via ADMIN_STELLAR_PUBKEYS env.
        Error code references: `AUTH_ERROR`, `INFRA_ERROR`, `INTERNAL_ERROR`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Treasury balance retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: string
                  asset:
                    type: string
                  contractId:
                    type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"
  /treasury/withdraw:
    post:
      tags: [Treasury]
      summary: Withdraw funds from the treasury
      description: |-
        Withdraws tokens from the escrow contract treasury.
        Only admin wallets can perform this operation.
        Error code references: `AUTH_ERROR`, `DOMAIN_ERROR`, `INFRA_ERROR`, `INTERNAL_ERROR`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                destination:
                  type: string
                  description: Stellar public key to receive the funds.
                amount:
                  type: string
                  description: Amount to withdraw in USDC.
              required: [destination, amount]
      responses:
        "200":
          description: Withdrawal transaction built.
          content:
            application/json:
              schema:
                type: object
                properties:
                  unsignedXdr:
                    type: string
        "400":
          $ref: "#/components/responses/LegacyValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalError"
  /treasury/config:
    get:
      tags: [Treasury]
      summary: Fetch treasury configuration
      description: |-
        Returns the current treasury configuration including contract ID and network.
        Error code references: `AUTH_ERROR`, `INTERNAL_ERROR`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Treasury configuration retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  contractId:
                    type: string
                  network:
                    type: string
                  asset:
                    type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"
  /goals:
    get:
      tags: [Goals]
      summary: Fetch authenticated goal analytics
      description: "Error code references: `AUTH_ERROR`, `NOT_FOUND`, `INTERNAL_ERROR`."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Goal analytics returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalsAnalyticsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"
