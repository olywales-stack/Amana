name: Contracts CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - "contracts/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "contracts/**"

concurrency:
  group: contracts-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/amana_escrow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test
