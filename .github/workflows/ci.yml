name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/ci.yml'
      - 'backend/**'
      - 'frontend/**'
      - 'mobile/**'
      - 'contracts/**'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/ci.yml'
      - 'backend/**'
      - 'frontend/**'
      - 'mobile/**'
      - 'contracts/**'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Stacks
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'frontend/package-lock.json'
            backend:
              - 'backend/**'
              - 'backend/package-lock.json'
            mobile:
              - 'mobile/**'
              - 'mobile/package-lock.json'
            contracts:
              - 'contracts/**'

  frontend:
    name: Frontend Required Gate
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        if: needs.changes.outputs.frontend == 'true'
        run: npm ci

      - name: Lint
        if: needs.changes.outputs.frontend == 'true'
        run: npm run lint

      - name: Build
        if: needs.changes.outputs.frontend == 'true'
        run: npm run build

      - name: Test
        if: needs.changes.outputs.frontend == 'true'
        run: npm test

      - name: Skip note (no frontend changes)
        if: needs.changes.outputs.frontend != 'true'
        run: echo "No frontend file changes detected, required gate passed."

  backend:
    name: Backend Required Gate
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        if: needs.changes.outputs.backend == 'true'
        run: npm ci

      - name: Build
        if: needs.changes.outputs.backend == 'true'
        run: npm run build

      - name: Test
        if: needs.changes.outputs.backend == 'true'
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-value-with-minimum-length-32
        run: npm test

      - name: Skip note (no backend changes)
        if: needs.changes.outputs.backend != 'true'
        run: echo "No backend file changes detected, required gate passed."

  mobile:
    name: Mobile Required Gate
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install deps
        if: needs.changes.outputs.mobile == 'true'
        run: npm ci --legacy-peer-deps

      - name: Type check
        if: needs.changes.outputs.mobile == 'true'
        run: npm run type-check

      - name: Lint
        if: needs.changes.outputs.mobile == 'true'
        run: npm run lint

      - name: Skip note (no mobile changes)
        if: needs.changes.outputs.mobile != 'true'
        run: echo "No mobile file changes detected, required gate passed."

  contracts:
    name: Contracts Required Gate
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: contracts/amana_escrow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Test
        if: needs.changes.outputs.contracts == 'true'
        run: cargo test

      - name: Build WASM artifact
        if: needs.changes.outputs.contracts == 'true'
        run: cargo build --target wasm32-unknown-unknown --features wasm --release

      - name: Verify WASM ABI hash
        if: needs.changes.outputs.contracts == 'true'
        run: |
          WASM_FILE="target/wasm32-unknown-unknown/release/amana_escrow.wasm"
          if [ -f "$WASM_FILE" ]; then
            WASM_HASH=$(sha256sum "$WASM_FILE" | cut -d' ' -f1)
            echo "WASM ABI hash: $WASM_HASH"
            echo "WASM_ABI_HASH=$WASM_HASH" >> $GITHUB_ENV
          else
            echo "ERROR: WASM artifact not found at $WASM_FILE"
            exit 1
          fi

      - name: Skip note (no contract changes)
        if: needs.changes.outputs.contracts != 'true'
        run: echo "No contract file changes detected, required gate passed."
